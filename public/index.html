<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ STRATEGOS — Jeu de conquête mondiale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        /* ... (Garder tout ton CSS d'origine ici pour ne pas casser le design) ... */
        :root { --bg: #0d0d12; --surface: #13131e; --gold: #c9a84c; --text: #d4c5a9; --border: #2a2a4a; }
        body { font-family: 'Crimson Pro', serif; background: var(--bg); color: var(--text); height: 100vh; margin: 0; }
        #lobby, #waiting { display: flex; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(ellipse at center, #1a1a3e 0%, #0d0d12 70%); }
        .lobby-card, .waiting-card { background: var(--surface); border: 1px solid var(--border); padding: 40px; border-radius: 12px; text-align: center; width: 440px; }
        .btn { padding: 12px 28px; background: var(--gold); color: #000; border: none; border-radius: 6px; cursor: pointer; font-family: 'Cinzel'; width: 100%; margin-top: 10px; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid var(--border); color: #fff; }
        #playerList { list-style: none; padding: 0; margin: 20px 0; }
        #playerList li { background: #1a1a2e; margin: 5px 0; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="lobby-card">
        <h1 style="font-family: 'Cinzel'; color: var(--gold);">STRATEGOS</h1>
        <input id="playerName" placeholder="Ton nom de conquérant" maxlength="20">
        <button class="btn" onclick="createRoom()">⚔️ Créer une partie</button>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
        <input id="roomCode" placeholder="CODE DE LA SALLE" maxlength="6">
        <button class="btn" style="background: transparent; border: 1px solid var(--gold); color: var(--gold);" onclick="joinRoom()">Rejoindre</button>
    </div>
</div>

<div id="waiting" style="display:none;">
    <div class="waiting-card">
        <h2 style="font-family: 'Cinzel'; color: var(--gold);">SALLE D'ATTENTE</h2>
        <p>Code de la salle : <strong id="displayCode" style="color: #fff;">---</strong></p>
        
        <ul id="playerList">
            </ul>

        <button class="btn" id="startBtn" onclick="startGame()" disabled>
            En attente de joueurs (0/2)
        </button>
        <p id="adminStatus" style="font-size: 0.8rem; color: #6e6a5e; margin-top: 10px; font-style: italic;">
            Vous n'êtes pas le chef de la salle.
        </p>
    </div>
</div>

<div id="game" style="display:none;">
    <h2 style="color: var(--gold); text-align: center; padding: 20px;">LA BATAILLE COMMENCE !</h2>
</div>

<script>
let ws = null;
let myId = null;
let myName = '';
let roomId = null;
let isCreator = false;
let gameState = null;

// CONNEXION AU SERVEUR (Render gère le protocole automatiquement)
function connect(callback) {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}`);
    
    ws.onopen = () => {
        console.log("Connecté au serveur !");
        callback();
    };

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleMessage(msg);
    };

    ws.onerror = () => alert("Erreur de connexion !");
}

function send(data) {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(data));
    }
}

// ACTIONS BOUTONS
function createRoom() {
    myName = document.getElementById('playerName').value.trim() || 'Anonyme';
    isCreator = true; // Je suis le créateur
    connect(() => send({ type: 'join', name: myName }));
}

function joinRoom() {
    const code = document.getElementById('roomCode').value.trim().toUpperCase();
    if (!code) return alert("Code requis");
    myName = document.getElementById('playerName').value.trim() || 'Anonyme';
    isCreator = false; // Je rejoins une salle existante
    connect(() => send({ type: 'join', roomId: code, name: myName }));
}

function startGame() {
    send({ type: 'start' });
}

// GESTION DES MESSAGES DU SERVEUR
function handleMessage(msg) {
    if (msg.type === 'joined') {
        myId = msg.playerId;
        roomId = msg.roomId;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('waiting').style.display = 'flex';
        document.getElementById('displayCode').textContent = roomId;
    }

    if (msg.type === 'state') {
        gameState = msg.state;
        updateUI();
    }
}

// MISE À JOUR DE L'INTERFACE
function updateUI() {
    if (!gameState) return;

    // 1. Mise à jour de la liste des joueurs
    const list = document.getElementById('playerList');
    const players = Object.values(gameState.players);
    list.innerHTML = players.map(p => `<li>👤 ${p.name} ${p.id === myId ? '(Moi)' : ''}</li>`).join('');

    // 2. Logique du bouton Start
    const startBtn = document.getElementById('startBtn');
    const adminStatus = document.getElementById('adminStatus');
    const count = players.length;

    if (gameState.phase === 'lobby') {
        if (isCreator) {
            adminStatus.textContent = "Vous êtes le chef de la salle.";
            if (count >= 2) {
                startBtn.disabled = false;
                startBtn.innerText = "⚔️ LANCER LA BATAILLE";
                startBtn.style.background = "#c9a84c";
            } else {
                startBtn.disabled = true;
                startBtn.innerText = `Attente de joueurs (${count}/2)`;
            }
        } else {
            adminStatus.textContent = "En attente du chef de salle...";
            startBtn.disabled = true;
            startBtn.innerText = `Prêt ! (${count} joueurs connectés)`;
        }
    } else {
        // Si la phase n'est plus "lobby", on cache la salle d'attente
        document.getElementById('waiting').style.display = 'none';
        document.getElementById('game').style.display = 'block';
    }
}
</script>
</body>
</html>
